<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.75, maximum-scale=0.75, minimum-scale=0.75, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Login - A Segunda Lei</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth-styles.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <!-- Logo e Título -->
        <div class="auth-header">
            <svg class="auth-logo" width="60" height="60" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="2" width="11" height="11" rx="2" fill="url(#gradient1)"/>
                <rect x="15" y="2" width="11" height="11" rx="2" fill="url(#gradient2)"/>
                <rect x="28" y="2" width="11" height="11" rx="2" fill="url(#gradient3)"/>
                <rect x="2" y="15" width="11" height="11" rx="2" fill="url(#gradient4)"/>
                <rect x="15" y="15" width="11" height="11" rx="2" fill="url(#gradient5)"/>
                <rect x="28" y="15" width="11" height="11" rx="2" fill="url(#gradient6)"/>
                <rect x="2" y="28" width="11" height="11" rx="2" fill="url(#gradient7)"/>
                <rect x="15" y="28" width="11" height="11" rx="2" fill="url(#gradient8)"/>
                <rect x="28" y="28" width="11" height="11" rx="2" transform="rotate(8 34 34)" fill="url(#gradient9)"/>
                <defs>
                    <linearGradient id="gradient1" x1="2" y1="2" x2="13" y2="13" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#95d3ee"/>
                        <stop offset="1" stop-color="#6bb8d9"/>
                    </linearGradient>
                    <linearGradient id="gradient2" x1="15" y1="2" x2="26" y2="13" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#6bb8d9"/>
                        <stop offset="1" stop-color="#4a9cc4"/>
                    </linearGradient>
                    <linearGradient id="gradient3" x1="28" y1="2" x2="39" y2="13" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#4a9cc4"/>
                        <stop offset="1" stop-color="#2980af"/>
                    </linearGradient>
                    <linearGradient id="gradient4" x1="2" y1="15" x2="13" y2="26" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#6bb8d9"/>
                        <stop offset="1" stop-color="#4a9cc4"/>
                    </linearGradient>
                    <linearGradient id="gradient5" x1="15" y1="15" x2="26" y2="26" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#4a9cc4"/>
                        <stop offset="1" stop-color="#2980af"/>
                    </linearGradient>
                    <linearGradient id="gradient6" x1="28" y1="15" x2="39" y2="26" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#2980af"/>
                        <stop offset="1" stop-color="#1c567e"/>
                    </linearGradient>
                    <linearGradient id="gradient7" x1="2" y1="28" x2="13" y2="39" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#4a9cc4"/>
                        <stop offset="1" stop-color="#2980af"/>
                    </linearGradient>
                    <linearGradient id="gradient8" x1="15" y1="28" x2="26" y2="39" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#2980af"/>
                        <stop offset="1" stop-color="#1c567e"/>
                    </linearGradient>
                    <linearGradient id="gradient9" x1="28" y1="28" x2="39" y2="39" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#1c567e"/>
                        <stop offset="1" stop-color="#042235"/>
                    </linearGradient>
                </defs>
            </svg>
            <h1 class="auth-title">A Segunda Lei</h1>
            <p class="auth-subtitle">Tracker de Entropia Diária</p>
        </div>

        <!-- Container dos formulários -->
        <div class="auth-forms">
            <!-- Formulário de Login -->
            <div class="auth-form" id="signInForm">
                <h2 class="form-title">Entrar</h2>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input 
                            type="email" 
                            id="loginEmail" 
                            class="form-input" 
                            placeholder="seu@email.com"
                            required
                            autocomplete="email"
                        />
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Senha</label>
                        <input 
                            type="password" 
                            id="loginPassword" 
                            class="form-input" 
                            placeholder="••••••••"
                            required
                            autocomplete="current-password"
                            minlength="6"
                        />
                    </div>

                    <div class="form-footer">
                        <a href="#" id="forgotPassword" class="link-forgot">Esqueceu a senha?</a>
                    </div>

                    <button type="submit" class="btn-submit">
                        Entrar
                    </button>
                </form>

                <div class="form-switch">
                    <p>Não tem uma conta? <a href="#" id="showSignUp" class="link-switch">Cadastre-se</a></p>
                </div>
            </div>

            <!-- Formulário de Cadastro -->
            <div class="auth-form hidden" id="signUpForm">
                <h2 class="form-title">Criar Conta</h2>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label for="registerName">Nome Completo</label>
                        <input 
                            type="text" 
                            id="registerName" 
                            class="form-input" 
                            placeholder="Seu nome"
                            required
                            autocomplete="name"
                        />
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input 
                            type="email" 
                            id="registerEmail" 
                            class="form-input" 
                            placeholder="seu@email.com"
                            required
                            autocomplete="email"
                        />
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Senha</label>
                        <input 
                            type="password" 
                            id="registerPassword" 
                            class="form-input" 
                            placeholder="Mínimo 6 caracteres"
                            required
                            autocomplete="new-password"
                            minlength="6"
                        />
                    </div>

                    <div class="form-group">
                        <label for="registerConfirmPassword">Confirmar Senha</label>
                        <input 
                            type="password" 
                            id="registerConfirmPassword" 
                            class="form-input" 
                            placeholder="Digite a senha novamente"
                            required
                            autocomplete="new-password"
                            minlength="6"
                        />
                    </div>

                    <button type="submit" class="btn-submit">
                        Criar Conta
                    </button>
                </form>

                <div class="form-switch">
                    <p>Já tem uma conta? <a href="#" id="showSignIn" class="link-switch">Entrar</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="login.js"></script>
</body>
</html>
